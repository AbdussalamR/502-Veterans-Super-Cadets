env:
  RUBY_VERSION: 3.3.0
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: password
  DATABASE_USER: postgres
  DATABASE_PASSWORD: password

name: Rails tests
on: [pull_request]
jobs:
  rspec-test:
    name: RSpec
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:12
        ports:
        - 5432:5432
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
      - name: Install postgres client
        run: sudo apt-get install libpq-dev
      - name: Install additional dependencies
        run: gem install bundler
      - name: Create database
        env:
          DATABASE_USER: ${{ env.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ env.DATABASE_PASSWORD }}
          RAILS_ENV: test
        run: |
          DISABLE_SPRING=1 bundler exec rails db:create
          DISABLE_SPRING=1 bundler exec rails db:migrate
      - uses: borales/actions-yarn@v3.0.0
        with:
          cmd: install
      - name: Run tests
        env:
          DATABASE_USER: ${{ env.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ env.DATABASE_PASSWORD }}
          RAILS_ENV: test
        run: DISABLE_SPRING=1 bundler exec rspec spec
      - name: Run brakeman
        continue-on-error: true
        run: DISABLE_SPRING=1 bundle exec brakeman -o brakeman.txt
      - name: Run rubocop
        run: DISABLE_SPRING=1 bundler exec rubocop --force-exclusion vendor/*/** --out rubocop.txt
      - name: Upload coverage results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage
      - name: Upload rubocop report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rubocop-report.txt
          path: rubocop.txt
      - name: Upload brakeman report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: brakeman-report.txt
          path: brakeman.txt